<!DOCTYPE html>
<html>
<head>
<title>Contador de Arquivos</title>
</head>

<body>

<h1>Arquivos Gerados</h1>

<button onclick="getFiles()">Consultar</button>

<p id="result"></p>

<script>

async function getFiles() {

const response = await fetch("http://ALB_URL/files")

const data = await response.json()

document.getElementById("result").innerText =
"Total de arquivos: " + data.total_files

}

</script>

</body>
</html>
